name: Weather Cron Job

on:
  workflow_dispatch:  # ← just use manual trigger for testing

jobs:
  call-weather-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call weather cron endpoint
        run: |
          curl -X GET "https://fiscan-phi.vercel.app/api/weather"

